<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - Smart Health Advisor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            background: #111827;
            border-radius: 15px;
            padding: 30px;
            width: 350px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
            color: white;
        }

        .card h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .form-control {
            background: #1f2937;
            border: none;
            color: white;
        }

        .form-control:focus {
            background: #1f2937;
            color: white;
            box-shadow: none;
            border: 1px solid #22c55e;
        }

        .btn-custom {
            background: #22c55e;
            border: none;
            font-weight: bold;
        }

        .btn-custom:hover {
            background: #16a34a;
        }

        a {
            color: #22c55e;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
        .form-control {
    background: #1f2937;
    border: none;
    color: white;
}

.form-control::placeholder {
    color: #9ca3af;
    opacity: 1;
}

.form-control:focus {
    background: #1f2937;
    color: white;
    border: 1px solid #22c55e;
    box-shadow: none;
}
    </style>
</head>

<body>

<div class="card">
    <h2>🔐 Login</h2>

    <form method="POST">
        <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
        <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

        <button class="btn btn-custom w-100">Login</button>
    </form>

    <p class="text-center mt-3">
        Don't have an account? <a href="/register">Register</a>
    </p>
</div>

</body>
</html>
