<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
        }
    </style>
</head>

<body>

<div class="container mt-5 text-center">
    <h2>👋 Welcome, {{ user }}</h2>

    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card bg-dark text-white p-3">
                <h5>Total Predictions</h5>
                <h2>{{ total }}</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-dark text-white p-3">
                <h5>Last Prediction</h5>
                <h4>{{ last }}</h4>
            </div>
        </div>

        <div class="col-md-4">
            <a href="/" class="btn btn-success mt-4">Start Prediction</a>
        </div>
    </div>

    <a href="/history" class="btn btn-outline-light mt-4">View History</a>
</div>

</body>
</html>
