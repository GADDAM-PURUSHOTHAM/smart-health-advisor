<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Health Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat-container{
width:700px;
height:80vh;
background:#1e293b;
border-radius:12px;
display:flex;
flex-direction:column;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.chat-header{
background:#111827;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
border-radius:12px 12px 0 0;
}

.chat-box{
flex:1;
padding:20px;
overflow-y:auto;
background:#020617;
}

.message{
display:flex;
margin-bottom:15px;
}

.message.user{
justify-content:flex-end;
}

.message.bot{
justify-content:flex-start;
}

.bubble{
max-width:70%;
padding:10px 15px;
border-radius:12px;
}

.user .bubble{
background:#2563eb;
}

.bot .bubble{
background:#16a34a;
}

.avatar{
width:35px;
height:35px;
border-radius:50%;
margin-right:10px;
background:#475569;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

.user .avatar{
display:none;
}

.bot .avatar{
margin-right:10px;
}

.input-area{
display:flex;
padding:15px;
background:#111827;
border-top:1px solid #374151;
}

input{
flex:1;
background:#020617;
border:none;
color:white;
padding:10px;
border-radius:6px;
}

button{
margin-left:10px;
}

.suggestions{
font-size:13px;
color:#94a3b8;
padding:10px 20px;
}

</style>
</head>

<body>

<div class="chat-container">

<div class="chat-header">
🤖 AI Health Assistant
</div>

<div id="chatBox" class="chat-box">

<div class="suggestions">
Try asking:
• What causes fever?<br>
• What is dengue?<br>
• How to improve immunity?
</div>

</div>

<div class="input-area">

<input id="userInput" placeholder="Ask a health question...">

<button class="btn btn-success" onclick="sendMessage()">Send</button>

</div>

</div>

<script>

const inputField = document.getElementById("userInput");

inputField.addEventListener("keypress",function(e){
if(e.key==="Enter"){
sendMessage();
}
});

function sendMessage(){

let message=inputField.value.trim();

if(message==="") return;

let chatBox=document.getElementById("chatBox");

chatBox.innerHTML+=`
<div class="message user">
<div class="bubble">${message}</div>
</div>
`;

fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:message})
})
.then(res=>res.json())
.then(data=>{

chatBox.innerHTML+=`
<div class="message bot">
<div class="avatar">🤖</div>
<div class="bubble">${data.reply}</div>
</div>
`;

chatBox.scrollTop=chatBox.scrollHeight;

});

inputField.value="";
}

</script>

</body>
</html>
